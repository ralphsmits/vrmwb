<!DOCTYPE html>
<html lang="nl-NL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODj Widgetpagina – VRMWB</title>
<link href="https://cdn.jsdelivr.net/npm/gridstack@10.0/dist/gridstack.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet"/>
<style>
@font-face{font-family:'Frutiger';src:url('font/Frutiger Light.ttf') format('truetype');font-weight:300;font-style:normal}
@font-face{font-family:'Frutiger';src:url('font/Frutiger Regular.ttf') format('truetype');font-weight:400;font-style:normal}
@font-face{font-family:'Frutiger';src:url('font/Frutiger Italic.ttf') format('truetype');font-weight:400;font-style:italic}
@font-face{font-family:'Frutiger';src:url('font/Frutiger Bold.ttf') format('truetype');font-weight:700;font-style:normal}
@font-face{font-family:'Frutiger';src:url('font/Frutiger Black.ttf') format('truetype');font-weight:900;font-style:normal}

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D2100B;--navy:#17428C;--gold:#CC9933;
  --card-bg:rgba(255,255,255,0.72);
  --card-border:rgba(255,255,255,0.9);
  --card-shadow:0 4px 24px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.08);
  --text:#1E1E1E;--text-sub:#707172;--text-light:#9DA3B0;
  --divider:rgba(0,0,0,.08);--input-bg:rgba(0,0,0,.04);
  --radius:10px;--topbar-h:64px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Frutiger',sans-serif;background:#0A0C10;color:var(--text);display:flex;flex-direction:column}

/* BG */
.bg{
  position:fixed;inset:0;z-index:0;
  background:url('img/odjbackdrop.png') center/cover no-repeat;
}
.bg::after{
  content:'';position:absolute;inset:0;
  /* background:linear-gradient(to bottom,rgb(255, 255, 255) 10%,transparent 100%); */
  pointer-events:none;
}

/* TOP BAR */
.topbar{
  flex:0 0 var(--topbar-h);
  background:rgba(255, 255, 255);
  display:flex;align-items:center;padding:0 20px;
  z-index:100;position:relative;
}
.tb-logos{position:absolute;left:0;right:0;display:flex;align-items:center;justify-content:center;pointer-events:none;height:var(--topbar-h)}
.tb-logo-img{height:44px;width:auto;object-fit:contain;display:block;pointer-events:auto}
.tb-left{display:flex;align-items:center;gap:8px}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;justify-content:flex-end}
.tb-btn{
  border:none;height:32px;padding:0 16px;border-radius:25px;
  font-family:'Frutiger',sans-serif;font-size:12px;font-weight:900;cursor:pointer;
  transition:all .15s;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;
}
.tb-btn.gold{background:var(--gold);color:#1A1C22;border:none}
.tb-btn.gold:hover{background:#d9a830}
.tb-btn.gold.active{background:#1A1C22;color:#fff;border:none}
/* ODj Beheer – white with black border */
.tb-btn.white{
  background:#fff;color:#1A1C22;
  border:1px solid rgba(0, 0, 0, 0.2);
  text-decoration:none;display:inline-flex;align-items:center;
}
.tb-btn.white:hover{background:rgba(255,255,255,.85)}
/* Dark mode */
body.dark{
  --text:#E8EAED;--text-sub:#8A909E;--text-light:#4E5566;
  --divider:rgba(255,255,255,.06);--input-bg:rgba(255,255,255,.06);
}
/* Achtergrond: donkere overlay in plaats van lichte gradiënt */
body.dark .bg::after{background:rgba(0,0,0,.72)}
/* Topbar */
body.dark .topbar{background:rgba(10,11,16,.55);backdrop-filter:blur(8px)}
body.dark .tb-btn.white{background:rgba(255,255,255,.08);color:#E8EAED;border-color:rgba(255,255,255,.12)}
body.dark .tb-btn.white:hover{background:rgba(255,255,255,.15)}
body.dark .tb-btn.gold{color:#1A1C22}
body.dark .tb-datetime{color:rgba(255,255,255,.65)}
body.dark .tb-divider{background:rgba(255,255,255,.1)}
/* Locatie */
body.dark .loc-btn{background:rgba(255,255,255,.07);color:#E8EAED}
body.dark .loc-btn:hover{background:rgba(255,255,255,.13)}
body.dark .loc-ico{fill:var(--gold)}
body.dark .loc-menu{background:#16181F;border-color:rgba(255,255,255,.09);box-shadow:0 8px 32px rgba(0,0,0,.5)}
body.dark .loc-item{color:#E8EAED}
body.dark .loc-item:hover{background:rgba(255,255,255,.07)}
body.dark .loc-item.active{color:var(--gold);background:rgba(204,153,51,.12)}
/* Widgets */
body.dark .widget{
  background:rgba(24,27,36,.9);
  box-shadow:0 4px 24px rgba(0,0,0,.5),0 1px 4px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
body.dark .wh{background:rgba(255,255,255,.035);border-bottom-color:rgba(255,255,255,.06)}
body.dark .wh-title{color:#E8EAED}
body.dark .wb{color:var(--text-sub)}
body.dark .wbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
/* Widget inhoud */
body.dark .acc{background:rgba(255,255,255,.05);border-left-color:var(--red)}
body.dark .acc.blue{border-left-color:var(--navy)}
body.dark .acc.gold{border-left-color:var(--gold)}
body.dark .scell{background:rgba(255,255,255,.05)}
body.dark .scell .sl{color:var(--text-sub)}
body.dark .scell .sv{color:#E8EAED}
body.dark .trow{border-bottom-color:rgba(255,255,255,.06)}
body.dark .tlabel{color:#E8EAED}
body.dark .tmeta{color:var(--text-sub)}
body.dark .wtbl th{color:var(--text-sub);border-bottom-color:rgba(255,255,255,.08)}
body.dark .wtbl td{color:#E8EAED;border-bottom-color:rgba(255,255,255,.06)}
body.dark .tcb{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
body.dark .grid-stack-placeholder>.placeholder-content{background:rgba(204,153,51,.12);border-color:rgba(204,153,51,.5)}
/* Footer */
body.dark .btmbar{background:rgba(10,11,16,.97);border-top-color:rgba(255,255,255,.06);box-shadow:0 -3px 14px rgba(0,0,0,.4)}
body.dark .bb-logo strong{color:#E8EAED}
body.dark .bb-logo span{color:var(--text-sub)}
body.dark .bb-release{color:var(--text-light)!important}
body.dark .bb-add,body.dark .bb-date-nav{background:rgba(255,255,255,.1)}
body.dark .bb-profile:hover{background:rgba(255,255,255,.07)}
body.dark .bb-pname{color:#E8EAED}
body.dark .bb-prole{color:var(--text-sub)}
/* Profiel panel */
body.dark .profile-panel{background:#16181F;border-color:rgba(255,255,255,.09);box-shadow:0 8px 40px rgba(0,0,0,.55)}
body.dark .pp-inp{background:#1E2030;border-color:rgba(255,255,255,.12);color:#E8EAED}
body.dark .pp-inp:focus{border-color:var(--gold)}
body.dark .pp-avatar{background:var(--navy)}
body.dark .pp-head{color:var(--text-sub)}
body.dark .pp-lbl{color:var(--text-sub)}
body.dark .pp-inp{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:#E8EAED}
body.dark .pp-inp:focus{border-color:var(--gold)}
body.dark .pp-inp::placeholder{color:var(--text-light)}
body.dark .pp-toggle-row{border-top-color:rgba(255,255,255,.08)}
body.dark .pp-toggle-lbl{color:#E8EAED}
body.dark .pp-toggle{background:rgba(255,255,255,.12)}

/* Edit strip */
.estrip{position:fixed;top:var(--topbar-h);left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--navy),var(--gold),var(--navy));
  background-size:200% 100%;z-index:99;opacity:0;transition:opacity .2s;
  animation:emove 2s linear infinite}
body.edit-mode .estrip{opacity:1}
@keyframes emove{0%{background-position:0 0}100%{background-position:200% 0}}

/* CANVAS */
.canvas{flex:1;position:relative;z-index:5;overflow-y:auto;overflow-x:hidden;min-height:0}
.canvas::-webkit-scrollbar{width:4px}
.canvas::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}

/* GRIDSTACK */
.grid-stack{min-height:100%}
.grid-stack-item-content{border-radius:var(--radius);overflow:hidden}
.grid-stack-placeholder>.placeholder-content{
  background:rgba(23,66,140,.1);
  border:2px dashed rgba(23,66,140,.4);
  border-radius:var(--radius);
}

/* WIDGET – glassmorphism */
.widget{
  height:100%;
  background:rgba(255,255,255,0.80);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  /* border:1px solid rgba(0, 0, 0, 0.2); */
  border-radius:var(--radius);
  box-shadow:0 4px 24px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.9);
  display:flex;flex-direction:column;
  overflow:hidden;
  animation:win .22s cubic-bezier(.2,.8,.4,1) both;
}
@keyframes win{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
@keyframes eborder{
  0%,100%{box-shadow:0 0 0 2px rgba(23,66,140,.5),0 4px 24px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.9)}
  50%{box-shadow:0 0 0 2px rgba(204,153,51,.75),0 4px 24px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.9)}
}
body.edit-mode .widget{animation:eborder 2s ease-in-out infinite}
body.edit-mode .grid-stack-item:hover .widget{
  animation:none;
  box-shadow:0 0 0 2.5px var(--navy),0 4px 24px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.9)
}

/* Widget header */
.wh{flex:0 0 auto;height:46px;padding:0 10px 0 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(0,0,0,.08);user-select:none;cursor:default;background:rgba(255,255,255,.3)}
body.edit-mode .wh{cursor:grab}
body.edit-mode .wh:active{cursor:grabbing}
.wh-title{flex:1;font-size:24px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.5px}
.wh-acts{display:flex;gap:1px;flex-shrink:0}
.wb{width:26px;height:26px;border:none;border-radius:6px;background:transparent;cursor:pointer;font-size:11px;color:var(--text-sub);display:flex;align-items:center;justify-content:center;transition:all .12s}
.wb:hover{background:rgba(0,0,0,.07);color:var(--text)}
.wb.del:hover{background:var(--red);color:#fff}
.wb svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.wb.edit-btn,.wb.del{display:none}
body.edit-mode .wb.edit-btn,body.edit-mode .wb.del{display:flex}

/* Widget body */
.wbody{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 13px}
.wbody::-webkit-scrollbar{width:3px}
.wbody::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}

/* BOTTOM BAR */
.btmbar{
  flex:0 0 80px;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid rgba(0,0,0,.08);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 50px;z-index:50;
  box-shadow:0 -3px 14px rgba(0,0,0,.08);
  position:relative;
}
.bb-logo strong{font-size:14px;font-weight:700;text-transform:uppercase;color:var(--text);letter-spacing:.3px}
.bb-logo span{display:block;font-size:14px;font-weight:400;color:var(--text);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.bb-release{font-size:10px!important;font-weight:700!important;color:var(--text-light)!important;text-transform:none!important;letter-spacing:.2px!important;margin-top:3px!important}
.bb-add,.bb-date-nav{
  position:absolute;left:50%;transform:translateX(-50%);
  height:81px;border:none;border-radius:28px;
  font-family:'Frutiger',sans-serif;
  cursor:pointer;transition:opacity .15s,transform .15s;
  display:none;align-items:center;justify-content:center;
  background:var(--text);
}
.bb-add{width:220px;color:#fff}
.bb-add:hover{opacity:.85}
/* Normaal: toon datepicker; edit-mode: toon + */
.bb-date-nav{display:flex;width:280px;padding:0 8px;gap:0}
body.edit-mode .bb-date-nav{display:none}
body.edit-mode .bb-add{display:flex}
.bb-nav-arrow{
  background:transparent;border:none;color:rgba(255,255,255,.7);
  font-size:32px;font-weight:300;line-height:1;cursor:pointer;
  padding:0 12px;flex-shrink:0;transition:color .15s;
  font-family:'Frutiger',sans-serif;
}
.bb-nav-arrow:hover{color:#fff}
.bb-date-trigger{
  flex:1;background:transparent;border:none;
  font-family:'Frutiger',sans-serif;font-size:17px;font-weight:700;
  color:#fff;cursor:pointer;white-space:nowrap;letter-spacing:.2px;
  padding:0 4px;
}

/* Flatpickr custom theme */
.flatpickr-calendar{
  font-family:'Frutiger',sans-serif!important;
  border-radius:14px!important;
  box-shadow:0 8px 40px rgba(0,0,0,.18),0 1px 4px rgba(0,0,0,.07)!important;
  border:1px solid rgba(0,0,0,.08)!important;
  overflow:hidden;
}
.flatpickr-months{background:var(--navy);padding:4px 0}
.flatpickr-month,.flatpickr-monthDropdown-months,.flatpickr-current-month input.cur-year{color:#fff!important;fill:#fff!important}
.flatpickr-prev-month svg,.flatpickr-next-month svg{fill:#fff!important}
.flatpickr-prev-month:hover svg,.flatpickr-next-month:hover svg{fill:var(--gold)!important}
.flatpickr-weekday{color:var(--text-sub)!important;font-weight:900!important;font-size:11px!important}
.flatpickr-day{border-radius:8px!important;font-weight:700;color:var(--text)}
.flatpickr-day:hover,.flatpickr-day.prevMonthDay:hover,.flatpickr-day.nextMonthDay:hover{background:rgba(23,66,140,.1)!important;border-color:transparent!important}
.flatpickr-day.today{border-color:var(--gold)!important;color:var(--text)!important}
.flatpickr-day.today:hover{background:rgba(204,153,51,.15)!important}
.flatpickr-day.selected,.flatpickr-day.selected:hover{background:var(--navy)!important;border-color:var(--navy)!important;color:#fff!important}
/* Dark mode Flatpickr */
body.dark .flatpickr-calendar{background:#16181F!important;border-color:rgba(255,255,255,.09)!important;box-shadow:0 8px 40px rgba(0,0,0,.5)!important}
body.dark .flatpickr-weekday{color:var(--text-sub)!important}
body.dark .flatpickr-day{color:#E8EAED!important}
body.dark .flatpickr-day:hover{background:rgba(255,255,255,.08)!important}
body.dark .flatpickr-day.today{border-color:var(--gold)!important}
body.dark .flatpickr-day.prevMonthDay,body.dark .flatpickr-day.nextMonthDay{color:rgba(255,255,255,.25)!important}
.bb-datetime{font-size:22px;font-weight:400;color:var(--text-sub);letter-spacing:.2px;font-variant-numeric:tabular-nums;white-space:nowrap}
.bb-right{display:flex;align-items:center;gap:12px}
.bb-controls{display:flex;align-items:center;gap:8px}
.tb-datetime{font-size:18px;font-weight:400;color:rgba(0,0,0,.65);letter-spacing:.2px;font-variant-numeric:tabular-nums;white-space:nowrap}

/* Profile button in footer */
.bb-profile{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 10px;border-radius:12px;border:none;background:transparent;font-family:'Frutiger',sans-serif;transition:background .15s}
.bb-profile:hover{background:rgba(0,0,0,.06)}
.bb-avatar{width:38px;height:38px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;letter-spacing:.3px;flex-shrink:0}
.bb-pinfo{text-align:left}
.bb-pname{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.bb-prole{font-size:11px;font-weight:400;color:var(--text-sub);margin-top:1px}

/* Profile panel (dropdown) */
.tb-divider{width:1px;height:28px;background:rgba(0,0,0,.12);margin:0 4px}

/* Location selector */
.loc-wrap{position:relative}
.loc-btn{
  display:flex;align-items:center;gap:6px;
  height:32px;padding:0 12px 0 10px;border-radius:25px;border:none;
  background:rgba(0,0,0,.06);color:var(--text);
  font-family:'Frutiger',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:background .15s;white-space:nowrap;
}
.loc-btn:hover{background:rgba(0,0,0,.11)}
.loc-ico{width:14px;height:14px;stroke:none;fill:var(--navy);flex-shrink:0}
.loc-chevron{width:14px;height:14px;stroke:var(--text-sub);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:transform .2s}
.loc-wrap.open .loc-chevron{transform:rotate(180deg)}
.loc-menu{
  position:absolute;top:calc(100% + 8px);left:0;
  background:#fff;border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.14),0 1px 4px rgba(0,0,0,.07);
  border:1px solid rgba(0,0,0,.07);
  min-width:160px;padding:6px;
  opacity:0;pointer-events:none;transform:translateY(-6px);
  transition:opacity .18s,transform .18s;z-index:300;
}
.loc-wrap.open .loc-menu{opacity:1;pointer-events:all;transform:none}
.loc-item{
  display:block;width:100%;padding:9px 14px;border:none;border-radius:8px;
  background:transparent;text-align:left;font-family:'Frutiger',sans-serif;
  font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:background .12s;
}
.loc-item:hover{background:rgba(0,0,0,.05)}
.loc-item.active{color:var(--navy);background:rgba(23,66,140,.07)}
.profile-panel{position:fixed;bottom:92px;right:20px;background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.18),0 1px 4px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.08);width:300px;padding:24px;opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .2s,transform .2s;z-index:200;max-height:calc(100vh - 120px);overflow-y:auto}
/* Backdrop picker */
.pp-backdrop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.pp-backdrop-thumb{width:100%;aspect-ratio:16/9;border-radius:6px;cursor:pointer;object-fit:cover;border:2.5px solid transparent;transition:border-color .15s,transform .1s}
.pp-backdrop-thumb:hover{transform:scale(1.05)}
.pp-backdrop-thumb.selected{border-color:var(--navy)}
body.dark .pp-backdrop-thumb.selected{border-color:var(--gold)}
.profile-panel.open{opacity:1;pointer-events:all;transform:none}
.pp-avatar{width:56px;height:56px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;margin:0 auto 14px;letter-spacing:.3px}
.pp-head{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sub);margin-bottom:16px;text-align:center}
.pp-lbl{display:block;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sub);margin:12px 0 5px}
.pp-inp{width:100%;padding:9px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-family:'Frutiger',sans-serif;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .15s}
.pp-inp:focus{border-color:var(--navy)}
.pp-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:10px 0;border-top:1px solid rgba(0,0,0,.08)}
body.dark .pp-toggle-row{border-top-color:rgba(255,255,255,.08)}
.pp-toggle-lbl{font-size:14px;font-weight:700;color:var(--text)}
.pp-toggle{width:44px;height:26px;border-radius:13px;border:none;background:rgba(0,0,0,.15);cursor:pointer;padding:3px;transition:background .2s;flex-shrink:0;position:relative}
.pp-toggle[aria-checked="true"]{background:var(--navy)}
.pp-toggle-thumb{display:block;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .2s}
.pp-toggle[aria-checked="true"] .pp-toggle-thumb{transform:translateX(18px)}
.pp-save{width:100%;margin-top:16px;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-family:'Frutiger',sans-serif;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;transition:background .15s}
.pp-save:hover{background:#1a4fa8}

/* WIDGET CONTENT */
.acc{border-left:3px solid var(--red);background:rgba(0,0,0,.04);border-radius:0 8px 8px 0;padding:9px 11px;margin-bottom:8px}
.acc:last-child{margin-bottom:0}
.acc.blue{border-left-color:var(--navy)}
.acc.gold{border-left-color:var(--gold)}
.acc.green{border-left-color:#16a34a}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:900;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.pill.red{background:var(--red);color:#fff}
.pill.blue{background:var(--navy);color:#fff}
.pill.green{background:#16a34a;color:#fff}
.pill.gold{background:var(--gold);color:#1A1C22}
.pill.grey{background:rgba(0,0,0,.06);color:var(--text-sub);border:1px solid rgba(0,0,0,.1)}
.irow{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:3px}
.irow-l{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px}
.scell{background:rgba(0,0,0,.04);border-radius:8px;padding:8px 11px}
.scell .sl{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sub)}
.scell .sv{font-size:20px;font-weight:900;color:var(--text);margin-top:3px}
.wtbl{width:100%;border-collapse:collapse;font-size:14px}
.wtbl th{text-align:left;padding:5px 8px 9px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sub);border-bottom:2px solid rgba(0,0,0,.08)}
.wtbl td{padding:10px 8px;border-bottom:1px solid rgba(0,0,0,.06);font-weight:700;vertical-align:middle}
.wtbl tr:last-child td{border-bottom:none}
.trow{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.trow:last-child{border-bottom:none}
.tcb{width:16px;height:16px;border-radius:4px;border:2px solid rgba(0,0,0,.15);cursor:pointer;flex-shrink:0;margin-top:1.5px;appearance:none;background:#fff;transition:all .15s}
.tcb:checked{background:var(--navy);border-color:var(--navy);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:center;background-size:9px}
.tlabel{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;transition:color .15s}
.tcb:checked~.tc .tlabel{text-decoration:line-through;color:var(--text-sub)}
.tmeta{font-size:12px;color:var(--text-sub);margin-top:3px;font-weight:700}
.warnrow{display:flex;align-items:flex-start;gap:5px;font-size:13px;font-weight:700;color:var(--red);margin-top:4px}
.warnrow::before{content:'▲';font-size:9px;margin-top:2px;flex-shrink:0}

/* Ploeg section divider */
.ploeg-block{margin-bottom:18px}
.ploeg-block:last-child{margin-bottom:0}
.ploeg-block-hdr{
  font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.7px;
  color:#fff;padding:4px 10px;border-radius:5px;
  display:inline-block;margin-bottom:8px;
}

/* MODALS */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mov.open{opacity:1;pointer-events:all}
.mbox{background:#fff;border-radius:16px;padding:0;width:560px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.3);border:1px solid rgba(0,0,0,.08);animation:mmin .2s cubic-bezier(.2,.8,.4,1)}
@keyframes mmin{from{transform:scale(.9) translateY(10px)}to{transform:none}}
.mh{font-size:17px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--text);padding:22px 24px 18px;border-bottom:1.5px solid rgba(0,0,0,.08)}
#embody,#wpgrid{padding:20px 24px 0}
.macts{display:flex;gap:10px;justify-content:flex-end;padding:18px 24px 22px;border-top:1.5px solid rgba(0,0,0,.08);margin-top:20px}
.flbl{display:block;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sub);margin:18px 0 6px}
.flbl:first-of-type{margin-top:0}
.finp,.fta{width:100%;background:#f8f8f8;border:1.5px solid #e0e0e0;border-radius:8px;padding:11px 13px;font-family:'Frutiger',sans-serif;font-size:15px;font-weight:400;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.finp:focus,.fta:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(23,66,140,.1)}
.fta{resize:vertical;min-height:120px;line-height:1.65;font-size:14px}
.fhint{font-size:12px;color:var(--text-sub);margin-top:9px;line-height:1.6;font-weight:400;background:#f4f5f8;border:1px solid #e8e8e8;border-radius:8px;padding:9px 12px}
.fhint code{font-family:monospace;background:rgba(23,66,140,.08);color:var(--navy);padding:2px 6px;border-radius:4px;font-size:12px;font-weight:700}
.bprim{background:var(--navy);color:#fff;border:none;padding:11px 26px;border-radius:8px;font-family:'Frutiger',sans-serif;font-weight:900;font-size:13px;cursor:pointer;transition:background .15s;text-transform:uppercase;letter-spacing:.4px}
.bprim:hover{background:#1a4fa8}
.bsec{background:transparent;border:1.5px solid #ddd;color:var(--text-sub);font-size:13px;font-weight:700;cursor:pointer;font-family:'Frutiger',sans-serif;padding:11px 20px;border-radius:8px;transition:border-color .15s,color .15s}
.bsec:hover{border-color:#999;color:var(--text)}
.frow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.frow2{display:flex;gap:7px;margin-bottom:7px}
.frow .finp,.frow2 .finp,.frow select.finp,.frow2 select.finp{flex:1;min-width:0}
.frow input[type=checkbox]{flex:0 0 18px;width:18px;height:18px;cursor:pointer;accent-color:var(--navy);margin:0}
.frow-del{flex:0 0 32px;width:32px;height:36px;border:none;background:#f0f0f0;border-radius:7px;color:#888;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.frow-del:hover{background:var(--red);color:#fff}
.fcard{border:1.5px solid #e8e8e8;border-radius:10px;padding:13px 13px 10px;margin-bottom:10px}
.fcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.fcard-num{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sub)}
.fcard>.finp{margin-bottom:7px;display:block}
.fadd{width:100%;margin-top:2px;padding:11px;background:none;border:1.5px dashed #ccc;border-radius:8px;color:var(--navy);font-family:'Frutiger',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.4px}
.fadd:hover{border-color:var(--navy);background:rgba(23,66,140,.04)}
.fadd.gold{color:var(--gold);border-color:var(--gold)}
.fadd.gold:hover{background:rgba(204,153,51,.06);border-color:#a07820}
select.finp{cursor:pointer}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wpick{background:#f4f5f8;border:1.5px solid #e0e0e0;border-radius:10px;padding:13px 10px 11px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Frutiger',sans-serif}
.wpick:hover{border-color:var(--navy);background:rgba(23,66,140,.04)}
.wpick.taken{opacity:.3;cursor:not-allowed;pointer-events:none}
.wpick-ico{width:32px;height:32px;border-radius:7px;background:#fff;border:1px solid #e0e0e0;margin:0 auto 7px;display:flex;align-items:center;justify-content:center}
.wpick-ico svg{width:15px;height:15px;stroke:var(--navy);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.wpick-name{font-size:12px;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
.ploeg-fcard{border:2px solid var(--navy);border-radius:12px;padding:14px 14px 12px;margin-bottom:14px;position:relative}
.ploeg-fcard-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ploeg-fcard-hdr .finp{font-weight:700;font-size:14px}
.ploeg-fcard-del{flex:0 0 32px;width:32px;height:34px;border:none;background:rgba(210,16,11,.08);border-radius:7px;color:var(--red);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ploeg-fcard-del:hover{background:var(--red);color:#fff}
.ploeg-members{display:flex;flex-direction:column;gap:0}
.fadd-member{margin-top:8px;padding:9px;background:none;border:1.5px dashed #ccc;border-radius:7px;color:var(--navy);font-family:'Frutiger',sans-serif;font-size:12px;font-weight:900;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.4px;width:100%}
.fadd-member:hover{border-color:var(--navy);background:rgba(23,66,140,.04)}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:#1A1C22;color:#fff;padding:9px 20px;border-radius:20px;font-weight:700;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:all .25s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* P2000 service badge */
.svc-badge{font-size:10px;font-weight:800;color:#fff;border-radius:4px;padding:1px 6px;display:inline-block}

/* ── MOBILE HOME ── */
.mob-home{flex:1;display:none;overflow-y:auto;overflow-x:hidden;position:relative;z-index:5;padding:20px 16px}
.mob-home::-webkit-scrollbar{width:4px}
.mob-home::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
.mob-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px 6px;max-width:380px;margin:0 auto;padding-top:16px}
.mob-app{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:'Frutiger',sans-serif;transition:transform .1s,opacity .1s}
.mob-app:active{transform:scale(.86);opacity:.75}
.mob-ico{width:66px;height:66px;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.45)}
.mob-ico svg{width:30px;height:30px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mob-lbl{font-size:11px;font-weight:700;color:#fff;text-align:center;text-shadow:0 1px 5px rgba(0,0,0,.9);letter-spacing:.1px;line-height:1.3;word-break:break-word;max-width:72px}
.mob-appview{position:fixed;inset:0;z-index:600;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .38s cubic-bezier(.25,.46,.45,.94);will-change:transform;background:#fff}
.mob-appview.open{transform:translateY(0)}
.mob-appnav{flex:0 0 56px;background:#fff;border-bottom:1.5px solid rgba(0,0,0,.08);display:flex;align-items:center;padding:0 8px;position:relative;flex-shrink:0}
.mob-appnav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:15px;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:.5px;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.mob-back-btn{background:none;border:none;color:var(--navy);font-family:'Frutiger',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:2px;padding:10px 14px 10px 4px;border-radius:8px;-webkit-tap-highlight-color:transparent}
.mob-back-btn:active{opacity:.6}
.mob-back-btn svg{width:20px;height:20px;stroke:var(--navy);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.mob-appbody{flex:1;overflow-y:auto;padding:16px}
.mob-appbody::-webkit-scrollbar{width:3px}
.mob-appbody::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
@media(max-width:768px){
  .canvas{display:none!important}
  .mob-home{display:block!important}
  .tb-left,.tb-datetime,#editbtn{display:none!important}
  .btmbar{padding:0 20px}
  .bb-add,.bb-date-nav{display:none!important}
  .bb-right{display:none!important}
  .toast{bottom:100px}
}
</style>

const I={

  cloud:`<svg viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>`,
  truck:`<svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function delRow(btn){btn.closest('.frow,.fcard,.ploeg-fcard').remove();}

function addMemberRow(btn){
  const members=btn.previousElementSibling;
  if(!members||!members.classList.contains('ploeg-members'))return;
  members.insertAdjacentHTML('beforeend',`
    <div class="frow">
      <input class="finp f-name" placeholder="Naam" style="flex:2">
      <input class="finp f-rank" placeholder="Functie (BV/Ch/2...)" style="flex:0 0 110px">
      <input class="finp f-extra" placeholder="Extra (WO : BV, ...)" style="flex:1;font-size:13px">
      <button class="frow-del" onclick="delRow(this)" type="button">×</button>
    </div>`);
}

function addPloegCard(container){
  container.insertAdjacentHTML('beforeend',`
    <div class="ploeg-fcard">
      <div class="ploeg-fcard-hdr">
        <input class="finp f-ploegnaam" placeholder="Voertuig (bijv. TS 1)" style="flex:1">
        <button class="ploeg-fcard-del" onclick="delRow(this)" type="button">×</button>
      </div>
      <div class="ploeg-members"></div>
      <button class="fadd-member" onclick="addMemberRow(this)" type="button">+ Lid toevoegen</button>
    </div>`);
}

function addFormRow(type){
  const c=document.getElementById('f-rows');if(!c)return;
  const n=c.querySelectorAll('.frow,.fcard').length+1;

const WEATHER_LAT=51.5719,WEATHER_LNG=4.7683,WEATHER_LOC='Tramsingel 71, Breda';
const WMO_DESC={0:'Helder',1:'Vrijwel helder',2:'Gedeeltelijk bewolkt',3:'Bewolkt',45:'Mist',48:'Rijpige mist',51:'Lichte motregen',53:'Motregen',55:'Zware motregen',61:'Lichte regen',63:'Regen',65:'Zware regen',71:'Lichte sneeuw',73:'Sneeuw',75:'Zware sneeuw',77:'Ijskorrels',80:'Lichte buien',81:'Buien',82:'Zware buien',85:'Sneeuwbuien',86:'Zware sneeuwbuien',95:'Onweer',96:'Onweer met hagel',99:'Zwaar onweer met hagel'};
function windDir(deg){const d=['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];return d[Math.round(deg/22.5)%16];}
async function fetchWeather(){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LNG}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,visibility&hourly=precipitation,precipitation_probability&forecast_hours=12&wind_speed_unit=kmh&timezone=Europe/Amsterdam`;
    const r=await fetch(url);if(!r.ok)return;
    const j=await r.json();const c=j.current;
    const rain=(j.hourly?.time||[]).map((t,i)=>({hour:t.slice(11,16),prob:j.hourly.precipitation_probability[i]??0,mm:j.hourly.precipitation[i]??0}));
    const data={loc:WEATHER_LOC,temp:Math.round(c.temperature_2m).toString(),desc:WMO_DESC[c.weather_code]??'Onbekend',wind:`${Math.round(c.wind_speed_10m)} km/h ${windDir(c.wind_direction_10m)}`,hum:`${c.relative_humidity_2m}%`,pres:`${Math.round(c.surface_pressure)} hPa`,vis:`${Math.round(c.visibility/1000)} km`,rain};
    widgets.filter(w=>w.type==='weather').forEach(w=>{w.data=data;refreshWidget(w.id);});
  }catch(e){console.error('Weather fetch fout:',e);}
}

const P2000_FEED='https://alarmeringen.nl/feeds/region/midden-en-west-brabant/all.rss';
function yesterdayRange(){
  const now=new Date();
  return{start:new Date(now.getFullYear(),now.getMonth(),now.getDate()-1,0,0,0,0).getTime(),end:new Date(now.getFullYear(),now.getMonth(),now.getDate()-1,23,59,59,999).getTime()};
}
function formatYesterdayLabel(){
  const d=new Date();const y=new Date(d.getFullYear(),d.getMonth(),d.getDate()-1);
  return`${DAYS[y.getDay()]} ${y.getDate()} ${MONTHS[y.getMonth()]} ${y.getFullYear()} — Brandweer alarmeringen`;
}
async function fetchP2000(){
  widgets.filter(w=>w.type==='p2000').forEach(w=>{w.data={loading:true};refreshWidget(w.id);});
  try{
    const enc=encodeURIComponent(P2000_FEED);
    let r=await fetch('https://api.codetabs.com/v1/proxy/?quest='+enc);
    if(!r.ok) r=await fetch('https://api.allorigins.win/raw?url='+enc);
    if(!r.ok) throw new Error('Feed not reachable');
    const xml=await r.text();
    const doc=new DOMParser().parseFromString(xml,'text/xml');
    const{start,end}=yesterdayRange();const items=[];
    for(const node of doc.querySelectorAll('item')){
      const title=(node.querySelector('title')?.textContent||'').trim();
      const desc=(node.querySelector('description')?.textContent||'').trim();
      const pub=(node.querySelector('pubDate')?.textContent||'').trim();
      const dt=new Date(pub);if(isNaN(dt.getTime()))continue;
      const ts=dt.getTime();if(ts<start||ts>end)continue;
      const u=title.toUpperCase();
      let service='P2000';
      if(/\bBZB\b/.test(u)||/^(BRAND|BRW|P\s?1|P\s?2)\b/.test(u)) service='BRW';
      else if(/^(A1|A2|A3|B1|B2|B3)\b/.test(u)) service='AMBU';
      else if(/\bPOLITIE\b/.test(u)) service='POL';
      if(service==='AMBU'||service==='POL') continue;
      const time=dt.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Amsterdam'});
      let prio='p3';
      if(/^(A1|B1|P\s?1)\b/.test(u)||/PRIO\s?1/i.test(u)) prio='p1';
      else if(/^(A2|B2|P\s?2)\b/.test(u)||/PRIO\s?2/i.test(u)) prio='p2';
      items.push({ts,time,prio,service,msg:desc||title});
    }
    items.sort((a,b)=>b.ts-a.ts);
    const dateLabel=formatYesterdayLabel();
    widgets.filter(w=>w.type==='p2000').forEach(w=>{w.data={items,dateLabel,loading:false};refreshWidget(w.id);});
  }catch(e){
    const dateLabel=formatYesterdayLabel();
    widgets.filter(w=>w.type==='p2000').forEach(w=>{w.data={items:[],dateLabel,loading:false};refreshWidget(w.id);});
  }
}

async function init(){
  const canvas=document.getElementById('canvas');
  const totalRows=8,margin=10;
  const cellH=Math.max(60,Math.floor((canvas.clientHeight-margin*(totalRows+1))/totalRows));
  grid=GridStack.init({el:'#grid',cellHeight:cellH,margin,column:12,staticGrid:true,animate:true,minRow:totalRows,draggable:{handle:'.wh'},resizable:{handles:'se'}});
  // Always load from /defaultjson/default.json
  try{
    const r=await fetch('/defaultjson/default.json');
    if(!r.ok) throw new Error('not found');
    const s=await r.json();
    if(s&&s.widgets&&s.widgets.length){
      widgets=s.widgets.filter(w=>T[w.type]);
      nextId=s.nextId||widgets.length+1;
      widgets.forEach(w=>{if(w.type==='p2000')w.data={loading:true};if(w.type==='weather')w.data=T.weather.def;});
      widgets.forEach(w=>renderWidget(w));
    }
  }catch(e){
    console.warn('Could not load /defaultjson/default.json, using built-in preset.',e);
    widgets=PRESET_STATE.widgets.filter(w=>T[w.type]);
    nextId=PRESET_STATE.nextId||widgets.length+1;
    widgets.forEach(w=>{if(w.type==='p2000')w.data={loading:true};if(w.type==='weather')w.data=T.weather.def;});
    widgets.forEach(w=>renderWidget(w));
  }
  grid.on('change',saveState);
  fetchWeather();setInterval(fetchWeather,5*60*1000);
  fetchP2000();scheduleMidnightRefresh();
  buildMobileHome();
}

}

const PROF_KEY='vrmwb_profile';
const BACKDROPS=Array.from({length:11},(_,i)=>`img/backdrops/backdrop${i+1}.jpg`);
let selectedBackdrop=null;
function buildBackdropGrid(){
  const grid=document.getElementById('pp-backdrop-grid');
  if(!grid)return;
  grid.innerHTML='';
  const p=JSON.parse(localStorage.getItem(PROF_KEY)||'{}');
  const current=p.backdrop||null;
  BACKDROPS.forEach(src=>{
    const img=document.createElement('img');
    img.className='pp-backdrop-thumb'+(src===current?' selected':'');
    img.src=src;
    img.alt='';
    img.onclick=function(){
      document.querySelectorAll('.pp-backdrop-thumb').forEach(t=>t.classList.remove('selected'));
      img.classList.add('selected');
      selectedBackdrop=src;
    };
    grid.appendChild(img);
  });
  selectedBackdrop=current;
}
function applyBackdrop(src){
  const bg=document.querySelector('.bg');
  if(!bg)return;
  if(src)bg.style.backgroundImage=`url('${src}')`;
  else bg.style.backgroundImage="url('img/odjbackdrop.png')";
}
function loadProfile(){
  const p=JSON.parse(localStorage.getItem(PROF_KEY)||'{}');
  const naam=p.voornaam||'';const ach=p.achternaam||'';const rol=p.rol||'';
  const initials=((naam[0]||'')+(ach[0]||'')).toUpperCase()||'?';
  document.getElementById('bb-avatar').textContent=initials;
  document.getElementById('pp-avatar').textContent=initials;
  document.getElementById('bb-pname').textContent=(naam+' '+ach).trim()||'Naam Achternaam';
  document.getElementById('bb-prole').textContent=rol||'Rol';
  document.getElementById('pp-voornaam').value=naam;
  document.getElementById('pp-achternaam').value=ach;
  document.getElementById('pp-rol').value=rol;
  const t=document.getElementById('dark-toggle');
  if(t)t.setAttribute('aria-checked',document.body.classList.contains('dark')?'true':'false');
  applyBackdrop(p.backdrop||null);
  buildBackdropGrid();
}
function saveProfile(){
  const voornaam=document.getElementById('pp-voornaam').value.trim();
  const achternaam=document.getElementById('pp-achternaam').value.trim();
  const rol=document.getElementById('pp-rol').value.trim();
  const p=JSON.parse(localStorage.getItem(PROF_KEY)||'{}');
  const backdrop=selectedBackdrop||p.backdrop||null;
  localStorage.setItem(PROF_KEY,JSON.stringify({voornaam,achternaam,rol,backdrop}));
  applyBackdrop(backdrop);
  loadProfile();closeProfilePanel();showToast('Profiel opgeslagen');
}
function toggleProfilePanel(){document.getElementById('profile-panel').classList.toggle('open');}
function closeProfilePanel(){document.getElementById('profile-panel').classList.remove('open');}
document.addEventListener('click',function(e){
  const panel=document.getElementById('profile-panel');
  const btn=document.getElementById('profile-btn');
  if(panel.classList.contains('open')&&!panel.contains(e.target)&&!btn.contains(e.target))closeProfilePanel();
});
loadProfile();

const APP_COLOR={werkzaamheden:['#007AFF','#0055D4'],weather:['#32ADE6','#0A7AC4'],voertuigen:['#FF9F0A','#CC7700'],reserveringen:['#FF6B35','#CC4415'],ploegindeling:['#5E5CE6','#3634A3'],topdesk:['#FF375F','#CC1035'],p2000:['#D2100B','#8B0707'],wegafsluiting:['#30D158','#1A8C38']};
function buildMobileHome(){
  const g=document.getElementById('mob-grid');if(!g)return;g.innerHTML='';
  widgets.forEach(w=>{const def=T[w.type];const c=APP_COLOR[w.type]||['#636366','#3A3A3C'];const btn=document.createElement('button');btn.className='mob-app';btn.onclick=()=>openApp(w.id);btn.innerHTML=`<div class="mob-ico" style="background:linear-gradient(145deg,${c[0]},${c[1]})">${I[def.ico]||''}</div><div class="mob-lbl">${def.label}</div>`;g.appendChild(btn);});
}
function openApp(id){const w=widgets.find(x=>x.id===id);if(!w)return;document.getElementById('mob-app-title').textContent=T[w.type].label;document.getElementById('mob-app-body').innerHTML=T[w.type].render(w.data,id);document.getElementById('mob-appview').classList.add('open');}
function closeApp(){document.getElementById('mob-appview').classList.remove('open');}

window.addEventListener('load',init);
</script>
