<!DOCTYPE html>
<html lang="nl-NL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ploegcommandant Dashboard – VRMWB</title>
<link href="https://cdn.jsdelivr.net/npm/gridstack@10.0/dist/gridstack.min.css" rel="stylesheet"/>
<style>
@font-face{font-family:'Frutiger';src:url('font/Frutiger Light.ttf') format('truetype');font-weight:300;font-style:normal}
@font-face{font-family:'Frutiger';src:url('font/Frutiger Regular.ttf') format('truetype');font-weight:400;font-style:normal}
@font-face{font-family:'Frutiger';src:url('font/Frutiger Italic.ttf') format('truetype');font-weight:400;font-style:italic}
@font-face{font-family:'Frutiger';src:url('font/Frutiger Bold.ttf') format('truetype');font-weight:700;font-style:normal}
@font-face{font-family:'Frutiger';src:url('font/Frutiger Black.ttf') format('truetype');font-weight:900;font-style:normal}

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D2100B;--navy:#17428C;--gold:#CC9933;
  --card-bg:#FFFFFF;--card-border:#E2E4E9;
  --card-shadow:0 2px 14px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.05);
  --text:#1E1E1E;--text-sub:#707172;--text-light:#9DA3B0;
  --divider:#ECEEF3;--input-bg:#F4F5F8;
  --radius:10px;--topbar-h:52px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Frutiger',sans-serif;background:#0A0C10;color:var(--text);display:flex;flex-direction:column}

/* BG */
.bg{
  position:fixed;inset:0;z-index:0;
  background:url('img/odjbackdrop.png') center/cover no-repeat;
  filter:blur(2px);transform:scale(1.04);
}

/* TOP BAR */
.topbar{
  flex:0 0 var(--topbar-h);background:var(--red);
  display:flex;align-items:center;padding:0 20px;
  z-index:100;position:relative;
  box-shadow:0 2px 14px rgba(0,0,0,.4);
}
.tb-logos{position:absolute;left:0;right:0;display:flex;align-items:center;justify-content:center;pointer-events:none;height:var(--topbar-h)}
.tb-logo-img{height:36px;width:auto;object-fit:contain;display:block;pointer-events:auto}
.tb-left{display:flex;align-items:center;gap:8px}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;justify-content:flex-end}
.tb-btn{
  border:none;height:32px;padding:0 16px;border-radius:25px;
  font-family:'Frutiger',sans-serif;font-size:12px;font-weight:900;cursor:pointer;
  transition:all .15s;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;
}
.tb-btn.gold{background:var(--gold);color:#1A1C22}
.tb-btn.gold:hover{background:#d9a830}
.tb-btn.gold.active{background:#fff;color:var(--red)}
.tb-btn.white{background:#fff;color:var(--red);text-decoration:none;display:inline-flex;align-items:center}
.tb-btn.white:hover{background:rgba(255,255,255,.85)}
.save-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35)}
.save-btn:hover{background:rgba(255,255,255,.25)}
.save-btn.saving{opacity:.6;pointer-events:none}
.save-btn.ok{background:#16a34a;color:#fff;border-color:#16a34a}
.save-btn.err{background:var(--red);color:#fff;border-color:var(--red)}
.load-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35)}
.load-btn:hover{background:rgba(255,255,255,.25)}
.load-btn.ok{background:#16a34a;color:#fff;border-color:#16a34a}
.load-btn.err{background:var(--red);color:#fff;border-color:var(--red)}
.tb-layout{font-size:11px;color:rgba(255,255,255,.7);font-weight:700;white-space:nowrap;letter-spacing:.3px;text-transform:uppercase}
.tb-layout strong{color:#fff;font-weight:900}

/* Edit strip */
.estrip{position:fixed;top:var(--topbar-h);left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--navy),var(--gold),var(--navy));
  background-size:200% 100%;z-index:99;opacity:0;transition:opacity .2s;
  animation:emove 2s linear infinite}
body.edit-mode .estrip{opacity:1}
@keyframes emove{0%{background-position:0 0}100%{background-position:200% 0}}

/* CANVAS */
.canvas{flex:1;position:relative;z-index:5;overflow-y:auto;overflow-x:hidden;min-height:0}
.canvas::-webkit-scrollbar{width:4px}
.canvas::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}

/* GRIDSTACK */
.grid-stack{min-height:100%}
.grid-stack-item-content{border-radius:var(--radius);overflow:hidden}
.grid-stack-placeholder>.placeholder-content{
  background:rgba(23,66,140,.12);
  border:2px dashed rgba(23,66,140,.45);
  border-radius:var(--radius);
}

/* WIDGET */
.widget{
  height:100%;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  box-shadow:var(--card-shadow);
  display:flex;flex-direction:column;
  overflow:hidden;
  animation:win .22s cubic-bezier(.2,.8,.4,1) both;
}
@keyframes win{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
body.edit-mode .widget{outline:2px solid rgba(23,66,140,.25);outline-offset:1px}
body.edit-mode .grid-stack-item:hover .widget{outline-color:rgba(23,66,140,.5)}

/* Widget header */
.wh{flex:0 0 auto;height:46px;padding:0 10px 0 14px;display:flex;align-items:center;gap:7px;border-bottom:2px solid var(--divider);user-select:none;cursor:default}
body.edit-mode .wh{cursor:grab}
body.edit-mode .wh:active{cursor:grabbing}
.wh-title{flex:1;font-size:24px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.5px}
.wh-acts{display:flex;gap:1px;flex-shrink:0}
.wb{width:26px;height:26px;border:none;border-radius:6px;background:transparent;cursor:pointer;font-size:11px;color:var(--text-sub);display:flex;align-items:center;justify-content:center;transition:all .12s}
.wb:hover{background:var(--input-bg);color:var(--text)}
.wb.del:hover{background:var(--red);color:#fff}
.wb svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* Edit/delete only visible in edit mode */
.wb.edit-btn,.wb.del{display:none}
body.edit-mode .wb.edit-btn,body.edit-mode .wb.del{display:flex}

/* Widget body */
.wbody{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 13px}
.wbody::-webkit-scrollbar{width:3px}
.wbody::-webkit-scrollbar-thumb{background:var(--divider);border-radius:3px}

/* BOTTOM BAR */
.btmbar{
  flex:0 0 80px;background:var(--card-bg);border-top:1px solid var(--divider);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 50px;z-index:50;
  box-shadow:0 -3px 14px rgba(0,0,0,.1);
  position:relative; /* Nodig voor het perfect centreren van de knop */
}
.bb-logo strong{font-size:14px;font-weight:700;text-transform:uppercase;color:var(--text);letter-spacing:.3px}
.bb-logo span{display:block;font-size:14px;font-weight:400;color:var(--text);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

.bb-add{
  position:absolute; /* Zorgt dat hij in het absolute midden blijft staan */
  left:50%;
  transform:translateX(-50%);
  background:var(--text);color:var(--card-bg);
  height:81px;width:200px;
  border:none;border-radius:28px;
  font-family:'Frutiger',sans-serif;font-size:36px;font-weight:300;line-height:56px;
  cursor:pointer;transition:opacity .15s;
  display:flex;align-items:center;justify-content:center;
  padding:0; /* Padding weggehaald zodat hij weer netjes zijn originele grootte heeft */
}
.bb-add:hover{opacity:.75}

.bb-datetime{font-size:22px;font-weight:400;color:var(--text-sub);letter-spacing:.2px;font-variant-numeric:tabular-nums;white-space:nowrap}

/* WIDGET CONTENT */
.acc{border-left:3px solid var(--red);background:var(--input-bg);border-radius:0 8px 8px 0;padding:9px 11px;margin-bottom:8px}
.acc:last-child{margin-bottom:0}
.acc.blue{border-left-color:var(--navy)}
.acc.gold{border-left-color:var(--gold)}
.acc.green{border-left-color:#16a34a}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:900;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.pill.red{background:var(--red);color:#fff}
.pill.blue{background:var(--navy);color:#fff}
.pill.green{background:#16a34a;color:#fff}
.pill.gold{background:var(--gold);color:#1A1C22}
.pill.grey{background:var(--input-bg);color:var(--text-sub);border:1px solid var(--card-border)}
.irow{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:3px}
.irow-l{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1}
.irow-r{flex-shrink:0;text-align:right}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px}
.scell{background:var(--input-bg);border-radius:8px;padding:8px 11px}
.scell .sl{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sub)}
.scell .sv{font-size:20px;font-weight:900;color:var(--text);margin-top:3px}
.wtbl{width:100%;border-collapse:collapse;font-size:14px}
.wtbl th{text-align:left;padding:5px 8px 9px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--text-sub);border-bottom:2px solid var(--divider)}
.wtbl td{padding:10px 8px;border-bottom:1px solid var(--divider);font-weight:700;vertical-align:middle}
.wtbl tr:last-child td{border-bottom:none}
.trow{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--divider)}
.trow:last-child{border-bottom:none}
.tcb{width:16px;height:16px;border-radius:4px;border:2px solid var(--card-border);cursor:pointer;flex-shrink:0;margin-top:1.5px;appearance:none;background:var(--card-bg);transition:all .15s}
.tcb:checked{background:var(--navy);border-color:var(--navy);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:center;background-size:9px}
.tlabel{font-size:14px;font-weight:700;color:var(--text);line-height:1.4;transition:color .15s}
.tcb:checked~.tc .tlabel{text-decoration:line-through;color:var(--text-sub)}
.tmeta{font-size:12px;color:var(--text-sub);margin-top:3px;font-weight:700}
.warnrow{display:flex;align-items:flex-start;gap:5px;font-size:13px;font-weight:700;color:var(--red);margin-top:4px}
.warnrow::before{content:'▲';font-size:9px;margin-top:2px;flex-shrink:0}

/* MODALS */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mov.open{opacity:1;pointer-events:all}
.mbox{background:var(--card-bg);border-radius:16px;padding:0;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.4);border:1px solid var(--card-border);animation:min .2s cubic-bezier(.2,.8,.4,1)}
@keyframes min{from{transform:scale(.9) translateY(10px)}to{transform:none}}
.mh{font-size:17px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--text);padding:22px 24px 18px;border-bottom:1.5px solid var(--divider)}
#embody,#wpgrid{padding:20px 24px 0}
.macts{display:flex;gap:10px;justify-content:flex-end;padding:18px 24px 22px;border-top:1.5px solid var(--divider);margin-top:20px}
.flbl{display:block;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sub);margin:18px 0 6px}
.flbl:first-of-type{margin-top:0}
.finp,.fta{width:100%;background:#fff;border:1.5px solid var(--card-border);border-radius:8px;padding:11px 13px;font-family:'Frutiger',sans-serif;font-size:15px;font-weight:400;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.finp:focus,.fta:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(23,66,140,.1)}
.fta{resize:vertical;min-height:120px;line-height:1.65;font-size:14px}
.fhint{font-size:12px;color:var(--text-sub);margin-top:9px;line-height:1.6;font-weight:400;background:var(--input-bg);border:1px solid var(--divider);border-radius:8px;padding:9px 12px}
.fhint code{font-family:monospace;background:rgba(23,66,140,.08);color:var(--navy);padding:2px 6px;border-radius:4px;font-size:12px;font-weight:700}
.bprim{background:var(--navy);color:#fff;border:none;padding:11px 26px;border-radius:8px;font-family:'Frutiger',sans-serif;font-weight:900;font-size:13px;cursor:pointer;transition:background .15s;text-transform:uppercase;letter-spacing:.4px}
.bprim:hover{background:#1a4fa8}
.bsec{background:transparent;border:1.5px solid var(--card-border);color:var(--text-sub);font-size:13px;font-weight:700;cursor:pointer;font-family:'Frutiger',sans-serif;padding:11px 20px;border-radius:8px;transition:border-color .15s,color .15s}
.bsec:hover{border-color:var(--text-sub);color:var(--text)}
/* Form builder rows */
.frow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.frow2{display:flex;gap:7px;margin-bottom:7px}
.frow .finp,.frow2 .finp,.frow select.finp,.frow2 select.finp{flex:1;min-width:0}
.frow input[type=checkbox]{flex:0 0 18px;width:18px;height:18px;cursor:pointer;accent-color:var(--navy);margin:0}
.frow-del{flex:0 0 32px;width:32px;height:36px;border:none;background:var(--input-bg);border-radius:7px;color:var(--text-sub);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.frow-del:hover{background:var(--red);color:#fff}
.fcard{border:1.5px solid var(--divider);border-radius:10px;padding:13px 13px 10px;margin-bottom:10px}
.fcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.fcard-num{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--text-sub)}
.fcard>.finp{margin-bottom:7px;display:block}
.fadd{width:100%;margin-top:2px;padding:11px;background:none;border:1.5px dashed var(--card-border);border-radius:8px;color:var(--navy);font-family:'Frutiger',sans-serif;font-size:13px;font-weight:900;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.4px}
.fadd:hover{border-color:var(--navy);background:rgba(23,66,140,.04)}
select.finp{cursor:pointer}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wpick{background:var(--input-bg);border:1.5px solid var(--card-border);border-radius:10px;padding:13px 10px 11px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Frutiger',sans-serif}
.wpick:hover{border-color:var(--navy);background:rgba(23,66,140,.04)}
.wpick.taken{opacity:.3;cursor:not-allowed;pointer-events:none}
.wpick-ico{width:32px;height:32px;border-radius:7px;background:var(--card-bg);border:1px solid var(--card-border);margin:0 auto 7px;display:flex;align-items:center;justify-content:center}
.wpick-ico svg{width:15px;height:15px;stroke:var(--navy);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.wpick-name{font-size:12px;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:.5px}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:#1A1C22;color:#fff;padding:9px 20px;border-radius:20px;font-weight:700;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:all .25s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MOBILE HOME ── */
.mob-home{flex:1;display:none;overflow-y:auto;overflow-x:hidden;position:relative;z-index:5;padding:20px 16px}
.mob-home::-webkit-scrollbar{width:4px}
.mob-home::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.mob-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px 6px;max-width:380px;margin:0 auto;padding-top:16px}
.mob-app{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:'Frutiger',sans-serif;transition:transform .1s,opacity .1s}
.mob-app:active{transform:scale(.86);opacity:.75}
.mob-ico{width:66px;height:66px;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.45)}
.mob-ico svg{width:30px;height:30px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mob-lbl{font-size:11px;font-weight:700;color:#fff;text-align:center;text-shadow:0 1px 5px rgba(0,0,0,.9);letter-spacing:.1px;line-height:1.3;word-break:break-word;max-width:72px}
/* App overlay */
.mob-appview{position:fixed;inset:0;z-index:600;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .38s cubic-bezier(.25,.46,.45,.94);will-change:transform;background:var(--card-bg)}
.mob-appview.open{transform:translateY(0)}
.mob-appnav{flex:0 0 56px;background:var(--card-bg);border-bottom:1.5px solid var(--divider);display:flex;align-items:center;padding:0 8px;position:relative;flex-shrink:0}
.mob-appnav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:15px;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:.5px;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
.mob-back-btn{background:none;border:none;color:var(--navy);font-family:'Frutiger',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:2px;padding:10px 14px 10px 4px;border-radius:8px;-webkit-tap-highlight-color:transparent}
.mob-back-btn:active{opacity:.6}
.mob-back-btn svg{width:20px;height:20px;stroke:var(--navy);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.mob-appbody{flex:1;overflow-y:auto;padding:16px}
.mob-appbody::-webkit-scrollbar{width:3px}
.mob-appbody::-webkit-scrollbar-thumb{background:var(--divider);border-radius:3px}
@media(max-width:768px){
  .canvas{display:none!important}
  .mob-home{display:block!important}
  .tb-layout,#editbtn,#savebtn,.tb-left{display:none!important}
  .btmbar{padding:0 20px}
  .bb-add{display:none!important}
  .bb-datetime{font-size:14px}
  .toast{bottom:100px}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="estrip"></div>

<header class="topbar">
  <div class="tb-left">
    <a href="https://rvanbroekhoven.github.io/ODj-VRMWB/" target="_blank" class="tb-btn white">ODj Beheer</a>
  </div>
  <div class="tb-logos">
    <img src="img/logo.png" alt="VRMWB Brandweer" class="tb-logo-img">
  </div>
  <div class="tb-right">
    <button class="tb-btn save-btn" id="savebtn" onclick="manualSave()">Opslaan</button>
    <button class="tb-btn load-btn" id="loadbtn" onclick="triggerLoad()">Laden</button>
    <input type="file" id="loadfile" accept=".json" style="display:none" onchange="loadFromFile(event)">
    <div class="tb-layout" id="layout-lbl">Layout: <strong>Vergrendeld</strong></div>
    <button class="tb-btn gold" id="editbtn" onclick="toggleEditMode()">Edit Mode</button>
  </div>
</header>

<main class="canvas" id="canvas">
  <div class="grid-stack" id="grid"></div>
</main>

<!-- Mobile home screen -->
<div class="mob-home" id="mob-home">
  <div class="mob-grid" id="mob-grid"></div>
</div>

<!-- Mobile app view (slides up from bottom) -->
<div class="mob-appview" id="mob-appview">
  <div class="mob-appnav">
    <button class="mob-back-btn" onclick="closeApp()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Terug
    </button>
    <div class="mob-appnav-title" id="mob-app-title"></div>
  </div>
  <div class="mob-appbody" id="mob-app-body"></div>
</div>

<footer class="btmbar">
  <div class="bb-logo">
    <strong>PLOEGLEIDER</strong>
    <span>Dashboard</span>
  </div>
  <button class="bb-add" onclick="openModal('add-modal')">+</button>
  <div class="bb-datetime"><span id="bbdate">—</span>&nbsp;&nbsp;<span id="bbtime"></span></div>
</footer>

<div class="mov" id="add-modal">
  <div class="mbox">
    <div class="mh">Widget toevoegen</div>
    <div class="wgrid" id="wpgrid"></div>
    <div class="macts"><button class="bsec" onclick="closeModal('add-modal')">Annuleren</button></div>
  </div>
</div>

<div class="mov" id="edit-modal">
  <div class="mbox">
    <div class="mh" id="emh">Bewerken</div>
    <div id="embody"></div>
    <div class="macts">
      <button class="bsec" onclick="closeModal('edit-modal')">Annuleren</button>
      <button class="bprim" onclick="saveEdit()">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── CLOCK ──
const DAYS=['Zo','Ma','Di','Wo','Do','Vr','Za'];
const MONTHS=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
let _lastDate='',_lastTime='';
function tick(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  const dateStr=`${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  const timeStr=`${p(d.getHours())}:${p(d.getMinutes())}`;
  if(dateStr!==_lastDate){document.getElementById('bbdate').textContent=dateStr;_lastDate=dateStr;}
  if(timeStr!==_lastTime){document.getElementById('bbtime').textContent=timeStr;_lastTime=timeStr;}
}

// ── WEATHER API (Open-Meteo) ──
const WEATHER_LAT = 51.5719;   // Breda
const WEATHER_LNG = 4.7683;
const WEATHER_LOC = 'Tramsingel 71, Breda';

const WMO_DESC = {
  0:'Helder',1:'Vrijwel helder',2:'Gedeeltelijk bewolkt',3:'Bewolkt',
  45:'Mist',48:'Rijpige mist',
  51:'Lichte motregen',53:'Motregen',55:'Zware motregen',
  61:'Lichte regen',63:'Regen',65:'Zware regen',
  71:'Lichte sneeuw',73:'Sneeuw',75:'Zware sneeuw',
  77:'Ijskorrels',80:'Lichte buien',81:'Buien',82:'Zware buien',
  85:'Sneeuwbuien',86:'Zware sneeuwbuien',
  95:'Onweer',96:'Onweer met hagel',99:'Zwaar onweer met hagel'
};

function windDir(deg){
  const d=['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];
  return d[Math.round(deg/22.5)%16];
}

async function fetchWeather(){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LNG}`
      +`&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,visibility`
      +`&hourly=precipitation,precipitation_probability&forecast_hours=12`
      +`&wind_speed_unit=kmh&timezone=Europe/Amsterdam`;
    const r=await fetch(url);
    if(!r.ok)return;
    const j=await r.json();
    const c=j.current;

    // Build 12-hour rain array
    const rain=(j.hourly?.time||[]).map((t,i)=>({
      hour:t.slice(11,16), // "HH:MM"
      prob:j.hourly.precipitation_probability[i]??0,
      mm:j.hourly.precipitation[i]??0,
    }));

    const data={
      loc:WEATHER_LOC,
      temp:Math.round(c.temperature_2m).toString(),
      desc:WMO_DESC[c.weather_code]??'Onbekend',
      wind:`${Math.round(c.wind_speed_10m)} km/h ${windDir(c.wind_direction_10m)}`,
      hum:`${c.relative_humidity_2m}%`,
      pres:`${Math.round(c.surface_pressure)} hPa`,
      vis:`${Math.round(c.visibility/1000)} km`,
      rain,
    };
    widgets.filter(w=>w.type==='weather').forEach(w=>{w.data=data;refreshWidget(w.id);});
  }catch(e){console.error('Weather fetch fout:',e);}
}


// ── P2000 LIVE FEED – alarmeringen.nl all.rss (Midden en West Brabant) ──
// all.rss = 100 items, ~24h, all services (ambulance, brandweer, politie)
const P2000_FEED = 'https://alarmeringen.nl/feeds/region/midden-en-west-brabant/all.rss';
const P2000_24H  = 24 * 60 * 60 * 1000;

async function fetchP2000(){
  try{
    const enc = encodeURIComponent(P2000_FEED);
    let r = await fetch('https://api.codetabs.com/v1/proxy/?quest=' + enc);
    if(!r.ok) r = await fetch('https://api.allorigins.win/raw?url=' + enc);
    if(!r.ok) return;

    const xml = await r.text();
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    const now = Date.now();
    const items = [];

    for(const node of doc.querySelectorAll('item')){
      const title   = node.querySelector('title')?.textContent?.trim() || '';
      const desc    = node.querySelector('description')?.textContent?.trim() || '';
      const pubDate = node.querySelector('pubDate')?.textContent?.trim() || '';
      const dt = new Date(pubDate);
      if(isNaN(dt.getTime()) || now - dt.getTime() > P2000_24H) continue;

      const time = dt.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Amsterdam'});
      const date = dt.toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit',timeZone:'Europe/Amsterdam'});

      const u = title.toUpperCase();
      let prio = 'p3';
      if(/^(A1|B1)\b/.test(u) || /^P\s?1\b/.test(u)) prio = 'p1';
      else if(/^(A2|B2)\b/.test(u) || /^P\s?2\b/.test(u)) prio = 'p2';

      let service = 'P2000';
      if(/^(A1|A2|A3|B1|B2|B3)\b/.test(u)) service = 'AMBU';
      else if(u.includes('BZB')) service = 'BRW';
      else if(u.includes('POLITIE')) service = 'POL';

      items.push({ts: dt.getTime(), time, date, prio, msg: desc || title, service});
    }

    widgets.filter(w=>w.type==='p2000').forEach(w=>{
      w.data = items.length ? {items} : {items:[], empty:true};
      refreshWidget(w.id);
    });
  }catch(e){console.error('P2000 fetch fout:',e);}
}

// ── WIDGET HTML ──
function widgetHTML(w){

// ── RENDER ──
function renderWidget(w){
  grid.addWidget({
    id:'gs'+w.id,
    x:w.x, y:w.y, w:w.w, h:w.h,
    minW:2, minH:2,
    content: widgetHTML(w)
  });
}

function refreshWidget(id){
  const w=widgets.find(x=>x.id===id);
  if(!w)return;
  document.getElementById(`wb${id}`).innerHTML=T[w.type].render(w.data,id);
}

function removeWidget(id){
  const el=document.querySelector(`.grid-stack-item[gs-id="gs${id}"]`);
  if(el)grid.removeWidget(el);
  widgets=widgets.filter(w=>w.id!==id);
  saveState();
  buildMobileHome();
}

function toggleTask(wid,idx,checked){

  if(w&&w.data.items[idx]!==undefined){w.data.items[idx].d=checked;saveState();}
}

// ── PICKER ──
function buildPicker(){
  const c=document.getElementById('wpgrid');c.innerHTML='';
  Object.entries(T).forEach(([type,def])=>{
    const taken=widgets.some(w=>w.type===type);
    const d=document.createElement('div');
    d.className='wpick'+(taken?' taken':'');
    d.innerHTML=`<div class="wpick-ico">${I[def.ico]||''}</div><div class="wpick-name">${def.label}</div>`;

  });

function addWidget(type){
  const w={id:nextId++,type,x:0,y:99,w:4,h:4,data:JSON.parse(JSON.stringify(T[type].def))};
  widgets.push(w);
  renderWidget(w);
  closeModal('add-modal');

  buildMobileHome();
  showToast(`${T[type].label} toegevoegd`);

function saveEdit(){

  w.data=T[w.type].parseForm();refreshWidget(w.id);closeModal('edit-modal');saveState();showToast('Wijzigingen opgeslagen');

// ── PERSIST ──
function syncPositions(){
  if(!grid)return;
  grid.engine.nodes.forEach(node=>{
    const id=parseInt((node.id||'').replace('gs',''));
    const w=widgets.find(x=>x.id===id);
    if(w){w.x=node.x;w.y=node.y;w.w=node.w;w.h=node.h;}
  });
}

function saveState(){
  syncPositions();
  const payload=JSON.stringify({widgets,nextId});
  try{
    localStorage.setItem('dashboardState',payload);
    return true;
  }catch(e){console.error('Auto-save error',e);}
  return false;
}

function manualSave(){
  syncPositions();
  const payload={widgets,nextId};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='dashboard-instellingen.json';
  a.click();
  URL.revokeObjectURL(url);
  const btn=document.getElementById('savebtn');
  btn.textContent='Gedownload ✓';btn.className='tb-btn save-btn ok';
  setTimeout(()=>{btn.className='tb-btn save-btn';btn.textContent='Opslaan';},3000);
}

function triggerLoad(){
  document.getElementById('loadfile').value='';
  document.getElementById('loadfile').click();
}

function loadFromFile(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const s=JSON.parse(ev.target.result);
      if(!s||!s.widgets||!s.widgets.length)throw new Error('Ongeldig bestand');
      // Clear current grid
      grid.removeAll();
      widgets=s.widgets.filter(w=>T[w.type]);
      nextId=s.nextId||widgets.length+1;
      widgets.forEach(w=>renderWidget(w));
      saveState();
      const btn=document.getElementById('loadbtn');
      btn.textContent='Geladen ✓';btn.className='tb-btn load-btn ok';
      setTimeout(()=>{btn.className='tb-btn load-btn';btn.textContent='Laden';},3000);
    }catch(err){
      console.error('Laad fout:',err);
      const btn=document.getElementById('loadbtn');
      btn.textContent='Fout';btn.className='tb-btn load-btn err';
      setTimeout(()=>{btn.className='tb-btn load-btn';btn.textContent='Laden';},3000);
    }
  };
  reader.readAsText(file);
}

// ── INIT ──
function init(){
  const canvas=document.getElementById('canvas');
  const totalRows=8;
  const margin=10;
  const cellH=Math.max(60,Math.floor((canvas.clientHeight-margin*(totalRows+1))/totalRows));

  grid=GridStack.init({
    el:'#grid',
    cellHeight:cellH,
    margin:margin,
    column:12,
    staticGrid:true,
    animate:true,
    minRow:totalRows,
    draggable:{handle:'.wh'},
    resizable:{handles:'se'}
  });

  // 1. Load from localStorage BEFORE attaching change listener
  //    so addWidget calls during render don't trigger saveState
  let loaded=false;
  try{
    const saved=localStorage.getItem('dashboardState');
    if(saved){
      const s=JSON.parse(saved);
      if(s&&s.widgets&&s.widgets.length){
        // Filter out any widget types that no longer exist in T (e.g. from old experiments)
        widgets=s.widgets.filter(w=>T[w.type]);
        nextId=s.nextId||widgets.length+1;
        // Always reset live-feed widgets so stale data never shows
        widgets.forEach(w=>{
          if(w.type==='p2000') w.data={items:[]};
          if(w.type==='weather') w.data=T.weather.def;
        });
        widgets.forEach(w=>renderWidget(w));
        loaded=true;
      }
    }
  }catch(e){
    console.error('Laad fout:',e);
  }

  // 2. Fall back to defaults if nothing saved locally
  if(!loaded){
    DEFAULT.forEach(d=>{
      const w={id:nextId++,type:d.type,x:d.x,y:d.y,w:d.w,h:d.h,data:JSON.parse(JSON.stringify(T[d.type].def))};
      widgets.push(w);renderWidget(w);
    });
    saveState(); // Save defaults locally so next load has data
  }

  // 3. Only NOW attach the change listener
  grid.on('change',saveState);

  // 4. Start live API feeds
  fetchWeather();
  setInterval(fetchWeather, 5*60*1000); // refresh every 5 min

  fetchP2000();
  setInterval(fetchP2000, 30*1000); // source updates ~every 30s

  buildMobileHome();
}
