<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breda KIS Dashboard - Secured met Wegafsluitingen</title>
    <link href="https://cdn.jsdelivr.net/npm/gridstack@10.0/dist/gridstack.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Kleurpalet */
            --navy-dark: #122053;
            --navy-bright: #17428C;
            --red-main: #D2100B;
            --red-dark: #AE1F1B;
            --gold: #CC9933;
            --bg-page: #E6E6E6;
            --widget-bg: #FFFFFF;
            --text-main: #000000;
            --text-muted: #707172;
            --green-check: #2d7a2d;
            --table-alt: #e9ecef;
        }

        body {
            background-color: var(--bg-page);
            background-image: url('img/odjbackdrop.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            height: 100vh;
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(18, 32, 83, 0.9);
            backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        
        .login-card {
            background: var(--widget-bg); padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            border-top: 5px solid var(--red-main); width: 100%; max-width: 350px;
        }
        
        .login-avatar { 
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover; 
            margin: 0 auto 20px auto; border: 3px solid var(--navy-bright);
            display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .login-card h2 { color: var(--navy-dark); margin-top: 0; font-weight: 800; font-size: 1.2rem; }
        
        .login-input {
            width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc;
            border-radius: 6px; box-sizing: border-box; font-size: 14px; text-align: center;
        }
        .login-input:focus { outline: 2px solid var(--navy-bright); border-color: transparent; }
        
        .login-btn {
            width: 100%; padding: 12px; background: var(--navy-bright);
            color: white; border: none; border-radius: 6px; font-weight: bold;
            cursor: pointer; transition: background 0.2s; text-transform: uppercase; font-size: 13px;
        }
        .login-btn:hover { background: var(--navy-dark); }
        
        #login-error { color: var(--red-main); font-size: 12px; font-weight: bold; display: none; margin-top: 10px; }

        /* --- MAIN APP CONTAINER --- */
        #app-container { display: none; padding: 20px; }

        /* --- Header & Clock --- */
        .header-bar {
            position: relative; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; padding: 15px 25px; background: rgba(18, 32, 83, 0.95); border-radius: 12px;
            color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); backdrop-filter: blur(10px);
        }

        .clock-container { font-size: 1.5rem; font-weight: 800; color: var(--gold); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .header-logo { position: absolute; left: 50%; transform: translateX(-50%); height: 40px; object-fit: contain; }
        .controls { display: flex; gap: 12px; align-items: center; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: all 0.2s; }
        #toggle-edit { background: var(--gold); color: white; }
        #toggle-edit.active { background: var(--red-main); }
        #open-widget-panel { background: var(--navy-bright); color: white; display: none; }
        body.edit-mode #open-widget-panel { display: block; }
        #logout-btn { background: #555; color: white; margin-right: 15px; }
        #logout-btn:hover { background: var(--red-main); }

        /* --- Widget Core Styling --- */
        .grid-stack-item-content {
            background-color: var(--widget-bg) !important; border: 2px solid var(--red-main); border-radius: 18px;
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .widget-header { background: #f8f9fa; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; flex-shrink: 0; }
        .widget-title { font-weight: 800; color: var(--navy-dark); font-size: 16px; }
        .scrollable { overflow-y: auto; flex-grow: 1; padding: 0; position: relative; }
        .delete-btn { background: #e0e0e0; color: #555; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 12px; }
        .delete-btn:hover { background: var(--red-main); color: white; }
        body.edit-mode .delete-btn { display: flex; }

        /* --- Clean Widget UI (Lijsten) --- */
        .widget-list { display: flex; flex-direction: column; padding: 12px; gap: 10px; }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 15px; background: #fafafa; border: 1px solid #eee; 
            border-radius: 10px; border-left: 4px solid var(--navy-bright); transition: transform 0.2s, box-shadow 0.2s;
        }
        .list-item:hover { transform: translateX(2px); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .list-item.p1 { border-left-color: var(--red-main); }
        .list-item.p2 { border-left-color: var(--gold); }
        .list-item.room-free { border-left-color: var(--green-check); }
        
        .item-main { flex-grow: 1; }
        .item-title { font-weight: 800; font-size: 13px; color: var(--navy-dark); margin-bottom: 4px; display: flex; align-items: center; gap: 8px;}
        .item-sub { font-size: 11px; color: var(--text-muted); }
        .item-side { text-align: right; min-width: 100px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px;}

        /* Badges & Tags */
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;}
        .badge-red { background: var(--red-main); color: white; }
        .badge-gold { background: var(--gold); color: white; }
        .badge-navy { background: var(--navy-dark); color: white; }
        .badge-green { background: var(--green-check); color: white; }
        .badge-grey { background: #e0e0e0; color: #333; }

        .v-tag-list { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
        .v-tag { background: var(--table-alt); border: 1px solid #ddd; color: var(--navy-dark); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 5px;}
        .v-tag i { color: var(--red-main); }

        /* --- Voertuigen Grid & Algemene Cards --- */
        .vehicle-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; padding: 12px; }
        .vehicle-card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); display: flex; flex-direction: column; justify-content: space-between; }
        .v-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .v-title { font-weight: 900; font-size: 1.2rem; color: var(--navy-dark); display: flex; align-items: center; }
        .v-type { font-size: 0.8rem; color: var(--text-muted); font-weight: normal; margin-left: 5px; }
        .v-details { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .v-details i { color: var(--navy-bright); width: 14px; text-align: center; }
        
        .v-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .v-dot.red { background-color: var(--red-main); box-shadow: 0 0 5px rgba(210,16,11,0.4); }
        .v-dot.green { background-color: var(--green-check); box-shadow: 0 0 5px rgba(45,122,45,0.4); }

        .v-gauges { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 5px; }
        .progress-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        .progress-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; width: 65px; }
        .progress-track { flex-grow: 1; height: 8px; background: #e9ecef; border-radius: 4px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease-in-out; }
        .progress-fill.blue { background-color: var(--navy-bright); }
        .progress-fill.lightblue { background-color: #5bc0de; }
        .progress-fill.gold { background-color: var(--gold); }
        .progress-val { font-size: 11px; font-weight: 800; color: var(--navy-dark); width: 35px; text-align: right; }

        /* --- Old KIS Native UI --- */
        .kis-container { padding: 20px; }
        .kis-title { font-size: 1.8rem; color: var(--navy-dark); margin: 0; }
        .kis-date { color: var(--text-muted); border-bottom: 3px solid var(--gold); padding-bottom: 5px; margin-bottom: 20px; font-weight: 600; }
        .work-item { display: flex; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; transition: all 0.3s ease; }
        .work-item.completed { opacity: 0.5; background: #fcfcfc; }
        .work-item.completed .task-title { text-decoration: line-through; color: var(--text-muted); }
        .work-item.completed .kis-checkbox { color: var(--text-muted); }
        .kis-checkbox { color: var(--green-check); font-size: 1.6rem; background: none; border: none; padding: 0; cursor: pointer; transition: color 0.2s; }
        .work-details .task-title { font-weight: 800; color: var(--red-dark); font-size: 1.1rem; margin-bottom: 5px; transition: all 0.3s; }
        .performer-tag { display: inline-block; background: var(--navy-dark); color: white; padding: 3px 10px; border-radius: 6px; font-size: 11px; margin: 2px 2px 2px 0; font-weight: 600; }
        .weather-box { text-align: center; padding: 30px 10px; height: 100%; display: flex; flex-direction: column; justify-content: center;}
        .weather-temp { font-size: 3.5rem; font-weight: 900; color: var(--navy-dark); margin: 10px 0; }
        .weather-loc { font-weight: bold; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        /* --- iOS Style Widget Drawer --- */
        .widget-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .widget-overlay.active { opacity: 1; pointer-events: auto; }
        .widget-drawer { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; height: 70vh; background: #f6f6f6; border-radius: 30px 30px 0 0; z-index: 1000; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 30px; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        .widget-drawer.active { bottom: 0; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .drawer-header h2 { margin: 0; color: var(--navy-dark); font-size: 1.5rem; }
        .close-drawer { background: #e0e0e0; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; font-weight: bold;}
        .widget-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; overflow-y: auto; padding-bottom: 20px; }
        .widget-card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .widget-card:hover { border-color: var(--navy-bright); transform: translateY(-3px); }
        .widget-card i { font-size: 2.5rem; color: var(--red-main); margin-bottom: 15px; }
        .widget-card h3 { margin: 0 0 5px 0; font-size: 1rem; color: var(--navy-dark); }
        .widget-card p { margin: 0; font-size: 0.8rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="https://static.vecteezy.com/system/resources/previews/026/434/409/non_2x/default-avatar-profile-icon-social-media-user-photo-vector.jpg" alt="User Avatar" class="login-avatar">
            <h2>Dashboard Toegang</h2>
            <input type="password" id="login-password" class="login-input" placeholder="Wachtwoord" autofocus>
            <button id="login-btn" class="login-btn">Inloggen</button>
            <div id="login-error">Wachtwoord onjuist. Probeer opnieuw.</div>
        </div>
    </div>

    <div id="app-container">
        <header class="header-bar">
            <div class="clock-container">
                <i class="fa-regular fa-clock"></i>
                <span id="live-clock">00:00:00</span>
            </div>
            
            <img src="img/logo.png" alt="Veiligheidsregio Brandweer" class="header-logo">
            
            <div class="controls">
                <button id="logout-btn" class="btn"><i class="fa-solid fa-lock"></i></button>
                <span id="status-label" style="margin-right: 15px; font-size: 13px;">Layout: <strong>Vergrendeld</strong></span>
                <button id="open-widget-panel" class="btn"><i class="fa-solid fa-plus"></i> Add Widget</button>
                <button id="toggle-edit" class="btn">Edit Mode</button>
            </div>
        </header>

        <div class="grid-stack" id="main-grid"></div>

        <div class="widget-overlay" id="widget-overlay"></div>
        <div class="widget-drawer" id="widget-drawer">
            <div class="drawer-header">
                <h2>Add Widgets</h2>
                <button class="close-drawer" id="close-drawer">✕</button>
            </div>
            <div class="widget-grid" id="drawer-grid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gridstack@10.0/dist/gridstack-all.js"></script>
    <script>
        // --- 0. LOGIN LOGIC ---
        const loginScreen = document.getElementById('login-screen');
        const appContainer = document.getElementById('app-container');
        const passwordInput = document.getElementById('login-password');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');

        let gridInitialized = false;

        function checkAuth() {
            if (sessionStorage.getItem('vrmwb_auth') === 'true') { showDashboard(); }
        }

        function attemptLogin() {
            if (passwordInput.value === 'vrmwb') {
                sessionStorage.setItem('vrmwb_auth', 'true');
                errorMsg.style.display = 'none';
                showDashboard();
            } else {
                errorMsg.style.display = 'block'; passwordInput.value = ''; passwordInput.focus();
            }
        }

        function showDashboard() {
            loginScreen.style.display = 'none';
            appContainer.style.display = 'block';
            if (!gridInitialized) { initGridStackDashboard(); gridInitialized = true; }
        }

        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') attemptLogin(); });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('vrmwb_auth');
            appContainer.style.display = 'none';
            loginScreen.style.display = 'flex';
            passwordInput.value = ''; passwordInput.focus();
        });

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('nl-NL'); }, 1000);


        // --- 1. DATA & WIDGET DEFINITIONS ---
        function renderProgressBar(val, colorClass, label) {
            if(!val) return '';
            return `
            <div class="progress-row" title="${label}: ${val}%">
                <div class="progress-label">${label}</div>
                <div class="progress-track"><div class="progress-fill ${colorClass}" style="width: ${val}%;"></div></div>
                <div class="progress-val">${val}%</div>
            </div>`;
        }

        const WIDGET_LIB = {
            'topdesk': { w: 6, h: 4, title: 'Topdesk', icon: 'fa-clipboard-list', desc: 'Meldingen Kazerne 1/2', html: `
                <div class="widget-header"><span class="widget-title">Topdesk - Kazerne 1 / 2</span><button class="delete-btn" onclick="removeWidget('topdesk')"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="scrollable">
                    <div class="widget-list">
                        <div class="list-item">
                            <div class="item-main">
                                <div class="item-title">Verstopping <span class="badge badge-navy">Breda</span></div>
                                <div class="item-sub"><strong>M2603 156</strong> • Aangemaakt: Di, 3 mrt 2026 • Streefdatum: 04/03</div>
                            </div>
                            <div class="item-side"><span class="badge badge-green">Afgehandeld</span><div class="item-sub">Meijers, Dennis</div></div>
                        </div>
                        <div class="list-item">
                            <div class="item-main">
                                <div class="item-title">Hybride schermen storing 1.77 <span class="badge badge-navy">Instructieruimte</span></div>
                                <div class="item-sub"><strong>M2603 073</strong> • Aangemaakt: Ma, 2 mrt 2026 • Streefdatum: 03/03</div>
                            </div>
                            <div class="item-side"><span class="badge badge-green">Afgehandeld</span><div class="item-sub">Hoekstra, Joost</div></div>
                        </div>
                    </div>
                </div>`
            },
            'alarmen': { w: 6, h: 4, title: 'Alarmen Vorige Dienst', icon: 'fa-bell', desc: 'Recente P1/P2', html: `
                <div class="widget-header"><span class="widget-title">Alarmen vorige dienst</span><button class="delete-btn" onclick="removeWidget('alarmen')"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="scrollable">
                    <div class="widget-list">
                        <div class="list-item p1">
                            <div class="item-main">
                                <div class="item-title"><span class="badge badge-red">P1</span> Brand - Gebouw - 05 Industrie</div>
                                <div class="item-sub"><i class="fa-solid fa-location-dot" style="color:var(--gold);"></i> Breda • 4-3-2026 (07:45)</div>
                                <div class="v-tag-list"><span class="v-tag">203133</span><span class="v-tag">203093</span><span class="v-tag">203134</span><span class="v-tag">200021</span></div>
                            </div>
                        </div>
                        <div class="list-item p2">
                            <div class="item-main">
                                <div class="item-title"><span class="badge badge-gold">P2</span> Brand - Buiten</div>
                                <div class="item-sub"><i class="fa-solid fa-location-dot" style="color:var(--gold);"></i> Verbeetenstraat Breda • 5-3-2026 (04:12)</div>
                                <div class="v-tag-list"><span class="v-tag">203132</span></div>
                            </div>
                        </div>
                    </div>
                </div>`
            },
            /* --- NIEUW: WEGAFSLUITINGEN WIDGET --- */
            'wegafsluitingen': { w: 4, h: 6, title: 'Wegafsluitingen', icon: 'fa-road-barrier', desc: 'Actuele wegafsluitingen in de regio', html: `
                <div class="widget-header"><span class="widget-title">Wegafsluitingen</span><button class="delete-btn" onclick="removeWidget('wegafsluitingen')"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="scrollable" style="padding: 12px; background: #fafafa;">
                    <div class="vehicle-card" style="padding: 0; overflow: hidden; border: 1px solid #ddd;">
                        <img src="https://rtvmiddenholland.nl/wp-content/uploads/2024/10/Omleiding-afsluiting-N210-Lopik.png" onerror="this.src='https://placehold.co/600x400/eeeeee/888888?text=Kaart+niet+gevonden'" alt="Kaart wegafsluiting" style="width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid var(--red-main);">
                        <div style="padding: 15px;">
                            <div class="item-title" style="font-size: 15px; margin-bottom: 8px;">Ploegstraat Breda <span class="badge badge-red" style="float: right;">Afgesloten</span></div>
                            <div class="item-sub" style="margin-bottom: 12px;"><i class="fa-regular fa-calendar"></i> Wo, 11 maart 2026 (Fase 1 t/m 5)</div>
                            <div style="font-size: 12px; font-weight: 700; color: var(--navy-dark); margin-bottom: 5px;">Herinrichting / onderhoud van Weg</div>
                            <div class="item-sub" style="color: var(--red-main); font-weight: bold;"><i class="fa-solid fa-triangle-exclamation"></i> Geen doorgang mogelijk.</div>
                            <div style="margin-top: 15px; font-size: 10px; color: var(--text-muted); text-align: left; border-top: 1px solid #eee; padding-top: 10px;">
                                (05-03) aangemaakt door: Ramon van Buren.<br>Reeks t/m (13/03/2026)
                            </div>
                        </div>
                    </div>
                </div>`
            },
            'ruimtes': { w: 4, h: 6, title: 'Ruimte Reserveringen', icon: 'fa-calendar-check', desc: 'Overzicht bezetting 11 maart', html: `
                <div class="widget-header"><span class="widget-title">Reserveringen Breda</span><button class="delete-btn" onclick="removeWidget('ruimtes')"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="scrollable">
                    <div class="widget-list">
                        <div class="list-item">
                            <div class="item-main">
                                <div class="item-title">Breda 1.77 <span class="v-type">Hybride</span></div>
                                <div class="v-tag-list">
                                    <span class="v-tag"><i class="fa-regular fa-clock"></i> 09:30 - 11:30</span>
                                    <span class="v-tag"><i class="fa-regular fa-clock"></i> 13:00 - 14:00</span>
                                </div>
                            </div>
                            <div class="item-side"><span class="badge badge-red">Bezet</span></div>
                        </div>
                        <div class="list-item">
                            <div class="item-main">
                                <div class="item-title">Breda 2.26 <span class="v-type">Vergader</span></div>
                                <div class="v-tag-list"><span class="v-tag"><i class="fa-regular fa-clock"></i> 08:00 - 12:00</span></div>
                            </div>
                            <div class="item-side"><span class="badge badge-red">Bezet</span></div>
                        </div>
                        <div class="list-item room-free">
                            <div class="item-main">
                                <div class="item-title">Breda 0.14 <span class="v-type">Vergader</span></div>
                                <div class="item-sub">Geen reserveringen voor vandaag.</div>
                            </div>
                            <div class="item-side"><span class="badge badge-green">Vrij</span></div>
                        </div>
                    </div>
                </div>`
            },
            'ploeg': { w: 4, h: 6, title: 'Ploegindeling', icon: 'fa-users', desc: 'Bezetting Breda', html: `
                <div class="widget-header"><span class="widget-title">Ploegindeling</span><button class="delete-btn" onclick="removeWidget('ploeg')"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="scrollable kis-container">
                    <h2 style="color:var(--navy-dark); border-bottom: 2px solid var(--gold); padding-bottom:5px; margin-top:0; font-size:1.4rem;">Bezetting Breda</h2>
                    <div id="ploeg-target"></div>
                </div>`
            },
            'voertuigen': { w: 12, h: 6, title: 'Status Voertuigen', icon: 'fa-truck-fast', desc: 'Overzicht wagenpark', html: `
                <div class="widget-header"><span class="widget-title">Status Voertuigen - Kazerne</span><button class="delete-btn" onclick="removeWidget('voertuigen')"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="scrollable">
                    <div class="vehicle-grid">
                        <div class="vehicle-card">
                            <div class="v-header">
                                <div class="v-title"><span class="v-dot red"></span> 203132 <span class="v-type">(TS)</span></div>
                                <span class="badge badge-red">ov (10)</span>
                            </div>
                            <div class="v-details"><div><i class="fa-solid fa-warehouse"></i> BREDA_1</div><div><i class="fa-regular fa-clock"></i> 4-3-2026 06:29</div></div>
                            <div class="v-gauges">${renderProgressBar(98, 'blue', 'Water')}${renderProgressBar(63, 'lightblue', 'Schuim')}${renderProgressBar(100, 'gold', 'Brandstof')}</div>
                        </div>
                        <div class="vehicle-card">
                            <div class="v-header">
                                <div class="v-title"><span class="v-dot red"></span> 203133 <span class="v-type">(TS)</span></div>
                                <span class="badge badge-red">ov (10)</span>
                            </div>
                            <div class="v-details"><div><i class="fa-solid fa-warehouse"></i> BREDA_1</div><div><i class="fa-regular fa-clock"></i> 4-3-2026 06:29</div></div>
                            <div class="v-gauges">${renderProgressBar(100, 'blue', 'Water')}${renderProgressBar(96, 'lightblue', 'Schuim')}${renderProgressBar(90, 'gold', 'Brandstof')}</div>
                        </div>
                        <div class="vehicle-card">
                            <div class="v-header">
                                <div class="v-title"><span class="v-dot green"></span> 203171 <span class="v-type">(HV-KR)</span></div>
                                <span class="badge badge-green">kz (5)</span>
                            </div>
                            <div class="v-details"><div><i class="fa-solid fa-warehouse"></i> BREDA_1</div><div><i class="fa-regular fa-clock"></i> 28-2-2026 07:02</div></div>
                        </div>
                    </div>
                </div>`
            },
            'weather': { w: 4, h: 4, title: 'Actueel Weer', icon: 'fa-cloud-sun', desc: 'Lokale weersverwachting', html: `
                <div class="widget-header"><span class="widget-title">Actueel Weer</span><button class="delete-btn" onclick="removeWidget('weather')"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="weather-box"><div class="weather-loc">Tramsingel 71, Breda</div><div class="weather-temp" id="temp">--°C</div><div id="desc" style="font-weight:600; color:#555">Laden...</div></div>` 
            },
            'werk': { w: 6, h: 6, title: 'Alg. Werkzaamheden', icon: 'fa-list-check', desc: 'Dagelijkse taken', html: `
                <div class="widget-header"><span class="widget-title">Alg. Werkzaamheden</span><button class="delete-btn" onclick="removeWidget('werk')"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="scrollable"><div class="kis-container"><h1 class="kis-title">Alg. Werkzaamheden</h1><p class="kis-date" id="werk-date">Vandaag</p><div id="worklist-target"></div></div></div>`
            }
        };

        const workData = [
            { id: 1, title: "Boodschappen & Koken", performers: ["Patrick Evers"], author: "Paul van der Heijden" },
            { id: 2, title: "Sport", performers: ["Geert Tuerlings"], author: "Paul van der Heijden" }
        ];

        const ploegData = [
            { name: "Arjan Otjens", chip: "TS 1 : BV" },
            { name: "Jurgen Bakx", chip: "TS 1 : Ch" },
            { name: "Dennis Meijers", chip: "TS 1 : 111" },
            { name: "Joost Hoekstra", chip: "TS 1 : 112" }
        ];

        // --- 2. INITIALIZATION FUNCTION ---
        let grid;
        
        /* --- AANGEPASTE STANDAARD LAYOUT INCLUSIEF WEGAFSLUITINGEN --- */
        const DEFAULT_LAYOUT = [
            { id: 'topdesk', x: 0, y: 0, w: 6, h: 4 },
            { id: 'alarmen', x: 6, y: 0, w: 6, h: 4 },
            { id: 'ruimtes', x: 0, y: 4, w: 4, h: 6 },
            { id: 'ploeg', x: 4, y: 4, w: 4, h: 6 },
            { id: 'wegafsluitingen', x: 8, y: 4, w: 4, h: 6 },
            { id: 'voertuigen', x: 0, y: 10, w: 12, h: 6 }
        ];

        function initGridStackDashboard() {
            grid = GridStack.init({ cellHeight: 70, margin: 15, staticGrid: true, animate: true });
            loadLayout();
            grid.on('change added removed', saveLayout);
            setupDrawer();
            setupEditMode();
        }

        // --- 3. LAYOUT MANAGEMENT ---
        function loadLayout() {
            // Version string geüpdatet naar V8 voor de nieuwe wegafsluitingen widget
            const saved = localStorage.getItem('bredaDashboardLayoutV8');
            let layoutToLoad = saved ? JSON.parse(saved) : DEFAULT_LAYOUT;
            
            grid.removeAll();
            layoutToLoad.forEach(item => {
                if (WIDGET_LIB[item.id]) {
                    grid.addWidget({ id: item.id, x: item.x, y: item.y, w: item.w, h: item.h, content: WIDGET_LIB[item.id].html });
                    populateWidgetData(item.id);
                }
            });
            updateDrawer();
        }

        function saveLayout() {
            const currentLayout = grid.engine.nodes.map(node => ({ id: node.id, x: node.x, y: node.y, w: node.w, h: node.h }));
            localStorage.setItem('bredaDashboardLayoutV8', JSON.stringify(currentLayout));
            updateDrawer();
        }

        window.removeWidget = function(id) { const el = document.querySelector(`.grid-stack-item[gs-id="${id}"]`); if (el) grid.removeWidget(el); };

        // --- 4. POPULATE WIDGET DATA ---
        function populateWidgetData(id) {
            if (id === 'weather') {
                fetch('https://api.open-meteo.com/v1/forecast?latitude=51.5896&longitude=4.7694&current_weather=true').then(res => res.json()).then(data => {
                    const t = document.getElementById('temp'); const d = document.getElementById('desc');
                    if(t) t.innerText = `${Math.round(data.current_weather.temperature)}°C`;
                    if(d) d.innerText = "Actueel gemeten";
                }).catch(e => console.log(e));
            }
            if (id === 'werk') {
                const target = document.getElementById('worklist-target'); const dateEl = document.getElementById('werk-date');
                if(dateEl) dateEl.innerText = new Date().toLocaleDateString('nl-NL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                if(target) { target.innerHTML = workData.map(item => `<div class="work-item"><button class="kis-checkbox"><i class="fa-solid fa-square-check"></i></button><div class="work-details"><div class="task-title">${item.title}</div><div>Uitvoerende: ${item.performers.map(p => `<span class="performer-tag">${p}</span>`).join('')}</div><div class="meta-info">Auteur: ${item.author}</div></div></div>`).join(''); }
            }
            if (id === 'ploeg') {
                const target = document.getElementById('ploeg-target');
                if(target) {
                    target.innerHTML = ploegData.map(p => `
                        <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #eee; align-items:center;">
                            <span style="font-weight:700;">${p.name}</span>
                            <span style="background:var(--red-main); color:white; padding:4px 10px; border-radius:6px; font-size:11px; font-weight:bold;">${p.chip}</span>
                        </div>`).join('');
                }
            }
        }

        // --- 5. IOS WIDGET DRAWER ---
        function setupDrawer() {
            const overlay = document.getElementById('widget-overlay'); const drawer = document.getElementById('widget-drawer');
            const oldBtn = document.getElementById('open-widget-panel'); const newBtn = oldBtn.cloneNode(true);
            oldBtn.parentNode.replaceChild(newBtn, oldBtn);
            
            newBtn.addEventListener('click', () => { updateDrawer(); overlay.classList.add('active'); drawer.classList.add('active'); });
            const closePanel = () => { overlay.classList.remove('active'); drawer.classList.remove('active'); };
            document.getElementById('close-drawer').addEventListener('click', closePanel);
            overlay.addEventListener('click', closePanel);
        }

        function updateDrawer() {
            const activeIds = grid.engine.nodes.map(n => n.id); const drawerGrid = document.getElementById('drawer-grid');
            drawerGrid.innerHTML = '';
            Object.keys(WIDGET_LIB).forEach(id => {
                if (!activeIds.includes(id)) {
                    const w = WIDGET_LIB[id];
                    drawerGrid.innerHTML += `<div class="widget-card" onclick="addWidgetFromDrawer('${id}')"><i class="fa-solid ${w.icon}"></i><h3>${w.title}</h3><p>${w.desc}</p></div>`;
                }
            });
            if (drawerGrid.innerHTML === '') drawerGrid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#888;">Geen widgets meer beschikbaar.</p>';
        }

        window.addWidgetFromDrawer = function(id) {
            const w = WIDGET_LIB[id]; grid.addWidget({ id: id, w: w.w, h: w.h, content: w.html });
            populateWidgetData(id); document.getElementById('close-drawer').click(); 
        };

        // --- 6. EDIT MODE TOGGLE ---
        function setupEditMode() {
            const toggleBtn = document.getElementById('toggle-edit'); const newToggle = toggleBtn.cloneNode(true);
            toggleBtn.parentNode.replaceChild(newToggle, toggleBtn);
            let isEditMode = false;
            newToggle.addEventListener('click', () => {
                isEditMode = !isEditMode; grid.setStatic(!isEditMode); document.body.classList.toggle('edit-mode', isEditMode);
                newToggle.textContent = isEditMode ? 'Klaar' : 'Edit Mode'; newToggle.classList.toggle('active', isEditMode);
                document.getElementById('status-label').innerHTML = `Layout: <strong>${isEditMode ? 'Ontgrendeld' : 'Vergrendeld'}</strong>`;
            });
        }

        // --- START PUNT ---
        document.addEventListener('DOMContentLoaded', () => { checkAuth(); });

    </script>
</body>
</html>
